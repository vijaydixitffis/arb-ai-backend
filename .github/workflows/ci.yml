name: Backend CI

on:
  push:
    branches: [main, stable-v1]
  pull_request:
    branches: [main, stable-v1]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff

      - name: Ruff lint
        run: ruff check backend/app --select E,F,W --ignore E501

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: arb
          POSTGRES_PASSWORD: arb
          POSTGRES_DB: arb_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://arb:arb@localhost:5432/arb_test
      SECRET_KEY: ci-test-secret-key
      GEMINI_API_KEY: dummy
      OPENAI_API_KEY: dummy
      USE_MOCK_LLM: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — skipping"

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: |
          if [ -f backend/Dockerfile ]; then
            docker build -t arb-ai-backend:ci ./backend
          else
            echo "No Dockerfile yet — skipping"
          fi
